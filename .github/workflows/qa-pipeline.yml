name: QA Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: qa-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute-tests:
    name: Execute Tests
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl
          sudo npx playwright install-deps || true

      - name: Install Playwright Chromium
        run: mvn exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Run tests
        run: mvn clean test -Dsurefire.suiteXmlFiles=testng.xml
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 15
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 15
          if-no-files-found: warn

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
          retention-days: 15
          if-no-files-found: warn

      - name: Upload GitHub Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

  deploy-pages:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: execute-tests
    if: always() && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4